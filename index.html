<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}
.card{text-align:center;background:white;padding:40px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.2);}
h1{color:#ff4d6d;}
button{padding:12px 28px;font-size:18px;border:none;border-radius:12px;cursor:pointer;margin:10px;}
#yes{background:#4CAF50;color:white;}
#no{background:#ff4d4d;color:white;position:absolute;}
</style>
</head>
<body>
<div class="card">
<h1>🥺 I'm Really Sorry ❤️</h1>
<p>Will you forgive me?</p>
<button id="yes">Yes ❤️</button>
<button id="no">No 😤</button>
<h2 id="result"></h2>
</div>
<script>
const no=document.getElementById("no");
function moveButton(){
 const x=Math.random()*(window.innerWidth-120);
 const y=Math.random()*(window.innerHeight-60);
 no.style.left=x+"px";
 no.style.top=y+"px";
}
no.addEventListener("mouseover",moveButton);
no.addEventListener("click",moveButton);
document.getElementById("yes").onclick=function(){
 document.getElementById("result").innerHTML="❤️ Yay!! Thank you! I promise I'll do better. ❤️";
};
</script>
</body>
</html>
